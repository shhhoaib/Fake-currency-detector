version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///app/pakshield.db
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
      - backend_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    profiles: ["prod"]
    environment:
      POSTGRES_DB: pakshield
      POSTGRES_USER: pakshield
      POSTGRES_PASSWORD: pakshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  backend_data:
