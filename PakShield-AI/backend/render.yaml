services:
  - type: web
    name: pakshield-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pakshield.db
      - key: SECRET_KEY
        value: pakshield-ai-secret-key-change-in-production-2026
      - key: CORS_ORIGINS_REGEX
        value: https?://(localhost:[0-9]+|.*\.vercel\.app|.*\.onrender\.com)
      - key: MODEL_PATH
        value: ./app/ml/yolo_cls.pt
      - key: UPLOAD_DIR
        value: ./uploads
